  <link rel="preconnect" href="https://fonts.googleapis.com">

  <main class="hero">

      <div class="bokeh bokeh-1"></div>
      <div class="bokeh bokeh-2"></div>
      <div class="bokeh bokeh-3"></div>
      <div class="stars"></div>
    </div>
    <div class="hero-inner hero-animate">
      <div class="hero-content hero-centered">
        <div class="hero-left">
          <h1 class="title animate-item"><span class="title-fuete">FUETE</span><span class="title-pvp">PVP</span></h1>
          <div class="buttons-stack animate-item">
            <div class="buttons-row">
              <a href="#" class="btn btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polygon points="5 3 19 12 5 21 5 3"/>
              </svg>
              CONNECT TO SERVER
            </a>
            <a href="shop.html" class="btn btn-primary">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

              STORE

          </div>

            </svg>
            JOIN DISCORD
          </a>
          </div>
        </div>
      </div>
      <div class="hero-logo-wrap animate-item">
        <img class="hero-logo" src="images/transparent_FuetePVP_logo.png" alt="FuetePVP" width="420" height="420" decoding="async" draggable="false">
      </div>
    </div>
  </main>

  <!-- Live Stats Section -->

    <h2 class="section-title">LIVE STATS</h2>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <span class="stat-value" id="players-online">0/128</span>
        <span class="stat-label">PLAYERS ONLINE</span>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 16 16" fill="currentColor">
            <path d="M13.545 2.907a13.2 13.2 0 0 0-3.257-1.011.05.05 0 0 0-.052.025c-.141.25-.297.577-.406.833a12.2 12.2 0 0 0-3.658 0 8 8 0 0 0-.412-.833.05.05 0 0 0-.052-.025c-1.125.194-2.22.534-3.257 1.011a.04.04 0 0 0-.021.018C.356 6.024-.213 9.047.066 12.032q.003.022.021.037a13.3 13.3 0 0 0 3.995 2.02.05.05 0 0 0 .056-.019q.463-.63.818-1.329a.05.05 0 0 0-.01-.059l-.018-.011a9 9 0 0 1-1.248-.595.05.05 0 0 1-.02-.066l.015-.019q.127-.095.248-.195a.05.05 0 0 1 .051-.007c2.619 1.196 5.454 1.196 8.041 0a.05.05 0 0 1 .053.007q.121.1.248.195a.05.05 0 0 1-.004.085 8 8 0 0 1-1.249.594.05.05 0 0 0-.03.03.05.05 0 0 0 .003.041c.24.465.515.909.817 1.329a.05.05 0 0 0 .056.019 13.2 13.2 0 0 0 4.001-2.02.05.05 0 0 0 .021-.037c.334-3.451-.559-6.449-2.366-9.106a.03.03 0 0 0-.02-.019m-8.198 7.307c-.789 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.45.73 1.438 1.613 0 .888-.637 1.612-1.438 1.612m5.316 0c-.788 0-1.438-.724-1.438-1.612s.637-1.613 1.438-1.613c.807 0 1.451.73 1.438 1.613 0 .888-.631 1.612-1.438 1.612"/>

        </div>
        <span class="stat-value" id="discord-members">...</span>
        <span class="stat-label">DISCORD MEMBERS</span>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <span class="stat-value" id="restart-timer">02:01:47</span>
        <span class="stat-label">NEXT RESTART</span>
      </div>
    </div>
  </section>

  <!-- Connect Section -->
  <section class="connect-section">
    <div class="connect-card">
      <h2 class="connect-title">CONNECT</h2>
      <p class="connect-subtitle">Copy the connect command below and paste it into the FiveM console:</p>
      <div class="connect-bar">
        <code class="connect-code" id="connect-code">connect cfx.re/join/egme7b</code>
        <button class="copy-btn" id="copy-btn" aria-label="Copy">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
        </button>
      </div>
      <div class="connect-steps">
        <div class="step">
          <span class="step-num">1</span>
          <span>OPEN FIVEM</span>
        </div>
        <div class="step">
          <span class="step-num">2</span>
          <span>PRESS F8</span>
        </div>
        <div class="step">
          <span class="step-num">3</span>
          <span>PASTE THE CONNECT COMMAND</span>
        </div>
      </div>
    </div>
  </section>

  <script src="script.js?v=20260429"></script>
</body>
</html>
